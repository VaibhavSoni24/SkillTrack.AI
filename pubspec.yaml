name: skilltrackerai
description: "SkillTrack.AI - AI-powered skill tracking and portfolio platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3

  # Auth
  flutter_appauth: ^8.0.1
  flutter_secure_storage: ^9.2.4

  # File Handling
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1

  # Analytics & Monitoring
  sentry_flutter: ^8.13.0
  posthog_flutter: ^4.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
